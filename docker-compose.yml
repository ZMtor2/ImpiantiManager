version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: impianti_postgres
    environment:
      POSTGRES_USER: impianti
      POSTGRES_PASSWORD: impianti_secret
      POSTGRES_DB: impianti_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: impianti_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
